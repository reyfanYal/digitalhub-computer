<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitalHub Computer | Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/auth.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body class="auth-page">

    <div class="auth-container">
        <div class="bento-card auth-card">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">DigitalHub.</a>
                <p class="auth-subtitle">Create your account to start customizing premium setups.</p>
            </div>

            <form id="registerForm" novalidate>
                <div class="form-group">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" id="fullName" class="form-control" placeholder="John Doe" required>
                    <span id="nameError" class="error-message"></span>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                    <span id="emailError" class="error-message"></span>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Minimum 6 characters"
                        required>
                    <span id="passwordError" class="error-message"></span>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat password"
                        required>
                    <span id="confirmPasswordError" class="error-message"></span>
                </div>

                <button type="submit" class="btn btn-primary w-full" style="margin-top: 8px;">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html" class="auth-link">Sign In</a>
            </div>
        </div>
    </div>
    
    <footer class="footer">
        <div class="footer-container">
            <p>&copy; 2026 DigitalHub Computer. Built with premium Vanilla Tech.</p>
            <div class="footer-links">
                <a href="#" class="footer-link">Privacy Policy</a>
                <a href="#" class="footer-link">Terms of Service</a>
            </div>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./assets/js/auth.js"></script>
</body>

</html>
